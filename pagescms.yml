backend:
  name: github
  repo: TaiZeDTich/guitar-songs # ВАЖНО: Убедитесь, что здесь ваше имя пользователя
  branch: main

local_backend: true
media_folder: "media" # Папка для будущих загрузок (изображений и т.д.)
public_folder: "/media"

collections:
  - name: "categories"   # Главный раздел для всех категорий
    label: "Категории"
    label_singular: "Категория"
    description: "Управление категориями песен"
    folder: "songs"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Название категории", widget: "string" }

  - name: "songs"        # Раздел для управления песнями
    label: "Песни"
    label_singular: "Песня"
    description: "Управление вашими песнями"
    folder: "songs"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Название песни", widget: "string" }
      - { name: "artist", label: "Исполнитель", widget: "string" }
      - { name: "text", label: "Текст с аккордами", widget: "text" }
